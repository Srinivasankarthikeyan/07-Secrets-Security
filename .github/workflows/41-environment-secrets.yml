name: 41 - Environment Secrets
# This workflow demonstrates the use of environment-specific secrets.
# Exam Tip: Environment secrets are only available to jobs that specify the environment.

on:
  workflow_dispatch:

jobs:
  deploy-production:
    # This job 'binds' to the 'production' environment
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Use Environment Secret
        # This secret must be defined in the 'production' environment settings
        run: echo "Prod API Key: ${{ secrets.API_KEY }}"

  deploy-staging:
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - name: Use Staging Secret
        # This secret must be defined in the 'staging' environment settings
        run: echo "Staging API Key: ${{ secrets.API_KEY }}"
