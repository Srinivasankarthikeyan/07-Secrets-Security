name: 45 - OIDC Authentication
# This workflow demonstrates the configuration needed for OpenID Connect (OIDC).
# Exam Tip: OIDC allows you to authenticate with cloud providers (AWS, Azure, GCP) without long-lived secrets.

on:
  workflow_dispatch:

permissions:
  # This is MANDATORY for OIDC to request the JWT token
  id-token: write
  contents: read

jobs:
  oidc-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Example: AWS Authentication using OIDC
