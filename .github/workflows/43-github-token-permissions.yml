name: 43 - GITHUB_TOKEN Permissions
# This workflow shows how to define granular permissions for the automatic GITHUB_TOKEN.
# Exam Tip: 'permissions' block should be used to follow the Principle of Least Privilege.

on:
  workflow_dispatch:

# Define permissions at the workflow level (applies to all jobs)
permissions:
  contents: read      # Needed to checkout code
  issues: write       # Needed to create/comment on issues
  pull-requests: none # Explicitly deny PR access

jobs:
  create-issue:
    runs-on: ubuntu-latest
    # Permissions can also be defined at the job level
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Automated Issue',
              body: 'Created by GitHub Actions'
            })
