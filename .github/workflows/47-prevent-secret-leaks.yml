name: 47 - Prevent Secret Leaks
# This workflow demonstrates best practices to prevent secret leaks.
# Exam Tip: Use secret scanning and audit logs to find and fix leaks.

on:
  workflow_dispatch:

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Security Best Practice - Do not print secrets
        run: |
          # BAD: echo "${{ secrets.MY_SECRET }}" | base64
          # GOOD: Use the secret directly in the command or as an env var
          my_cmd --api-key "$MY_SECRET"
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}

      # GitHub Secret Scanning (enabled in Repo Settings) 
      # automatically blocks pushes containing known secret patterns.
      
      # Tip: Use 'git-leaks' or similar tools in your CI to catch custom patterns.
