name: 42 - Secret Masking
# This workflow shows how to manually mask a value in the logs.
# Exam Tip: Masking is crucial for dynamic secrets or sensitive data generated during a job.

on:
  workflow_dispatch:

jobs:
  masking-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Generate and Mask Secret
        run: |
          # Generate a dynamic secret
          DYNAMIC_SECRET="super-secret-123"
          
          # Mask the secret so it appears as *** in subsequent steps
          echo "::add-mask::$DYNAMIC_SECRET"
          
          # Save to an environment variable for later steps
          echo "MY_SECRET=$DYNAMIC_SECRET" >> $GITHUB_ENV
          
      - name: Verify Masking
        run: |
          # This will output *** instead of the actual value
          echo "The secret is: $MY_SECRET"
