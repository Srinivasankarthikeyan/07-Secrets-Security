name: 39 - Repository Secrets
# This workflow shows how to use secrets stored at the repository level.
# Exam Tip: Repository secrets are encrypted and can be used in your workflows.

on:
  workflow_dispatch:

jobs:
  use-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Use Secret
        # Secrets are accessed via the 'secrets' context
        # In a real scenario, this would be an API key or password
        # DO NOT echo secrets directly to the log (GitHub masks them anyway)
        run: |
          echo "Using the secret..."
          # The following will show as *** in the logs
          echo "Secret value: ${{ secrets.MY_REPO_SECRET }}"
